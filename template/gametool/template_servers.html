<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title></title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bb: 'var(--bg-color)',
                        dynamicBg: 'var(--bg-color)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            font-weight: 400;
            width: 700px;
        }
    </style>
    <style>
        :root {
            --bg-color: {{ background_color }};
            --accent-from: {{ accent_from | default('#f59e0b') }};
            --accent-to: {{ accent_to | default('#ef4444') }};
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        .item-row {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s ease;
        }
        .item-row:hover {
            background: rgba(0, 0, 0, 0.22);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .label { color: var(--accent-from); }
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            margin: 8px 20px;
        }
    </style>
</head>

<body>
    <!-- Banner -->
    <div class="relative overflow-hidden" style="height: 260px;">
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('{{ banner }}');"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/40 to-dynamicBg"></div>
        <div class="relative z-10 flex flex-col items-center justify-center h-full">
            <img src="{{ logo }}" alt="logo" class="rounded-lg drop-shadow-lg" style="width: 260px;" />
            <div class="font-bold text-3xl mt-2 drop-shadow-lg">服务器列表</div>
        </div>
    </div>

    <!-- 服务器列表 -->
    <div class="px-5 mt-4 mb-2">
        <div class="flex flex-col gap-2">
            {% from "server_card.html" import server_card %}
            {% if servers_data is not none %}
            {% for server in servers_data %}
            {{ server_card(server, game) }}
            {% endfor %}
            {% else %}
            <div class="glass-card text-center text-white/60 py-6 text-sm">暂无服务器</div>
            {% endif %}
        </div>
    </div>

    <!-- 底部 -->
    <div class="flex flex-col items-center text-white/60 py-4 mt-2">
        <div class="section-divider w-2/3 mb-3"></div>
        <span class="text-xs tracking-wider uppercase">powered by astrbot</span>
        <span class="text-[10px] mt-0.5 text-white/50">数据更新时间：{{ update_time }}</span>
    </div>
</body>

</html>
