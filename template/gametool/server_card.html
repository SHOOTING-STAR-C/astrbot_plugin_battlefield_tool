{% macro server_card(w, game) %}
<div class="item-row">
    <div class="flex-shrink-0 flex flex-col items-center justify-center" style="width: 180px;">
        <img src="{{ w.image }}" class="object-cover rounded-lg" style="height: 80px; width: 160px;" />
        <div class="text-xs mt-1 text-white truncate text-center" style="max-width: 160px;">{{ w.current_map }}</div>
    </div>

    <div class="flex-1 flex flex-col gap-2">
        <div>
            <div class="text-sm label uppercase tracking-wider">服务器</div>
            <div class="text-lg font-bold font-mono text-white truncate max-w-[400px]" title="{{ w.name }}">{{ w.name }}</div>
        </div>
        <div class="grid grid-cols-3 gap-2">
            <div>
                <div class="text-sm label uppercase tracking-wider">模式</div>
                <div class="text-base font-bold font-mono text-white truncate max-w-[80px]">{{ w.mode }}</div>
            </div>
            <div>
                <div class="text-sm label uppercase tracking-wider">人数</div>
                <div class="text-base font-bold font-mono text-white">{{ w.server_info }}</div>
            </div>
            <div>
                <div class="text-sm label uppercase tracking-wider">区服</div>
                <div class="text-base font-bold font-mono text-white">{{ w.country }}</div>
            </div>
        </div>
    </div>
</div>
{% endmacro %}
